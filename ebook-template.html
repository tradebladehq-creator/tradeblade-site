<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="utf-8"/>
<style>
@page { size: letter; margin: 1in 1.2in; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 11.5pt; line-height: 1.65; color: #111; margin: 0; padding: 0; }
h1 { font-size: 28pt; font-weight: 900; text-align: center; margin: 0; line-height: 1.15; }
h2 { font-size: 16pt; font-weight: 700; margin: 0 0 12pt; }
h3 { font-size: 13pt; font-weight: 700; margin: 18pt 0 8pt; }
p { margin: 0 0 8pt; text-align: justify; }
.page { page-break-after: always; }
.page:last-child { page-break-after: avoid; }
.center { text-align: center; }
.title-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; text-align: center; }
.title-page .subtitle { font-size: 14pt; color: #444; margin-top: 16pt; }
.title-page .proof { font-size: 11pt; color: #666; font-style: italic; margin-top: 8pt; }
.dedication { display: flex; align-items: center; justify-content: center; min-height: 70vh; text-align: center; font-style: italic; color: #555; font-size: 12pt; }
.quote-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
.quote-page blockquote { font-style: italic; color: #333; max-width: 500px; margin: 0 auto 16pt; font-size: 11.5pt; line-height: 1.5; }
.quote-page .attribution { color: #666; font-size: 10pt; margin-bottom: 24pt; }
.toc { min-height: 80vh; }
.toc h2 { text-align: center; margin-bottom: 20pt; }
.toc .part { font-weight: 700; font-size: 11pt; margin: 14pt 0 4pt; color: #222; }
.toc .chapter { margin-left: 24pt; font-size: 10.5pt; color: #444; margin-bottom: 2pt; }
.part-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
.part-divider .part-num { font-size: 14pt; font-weight: 600; color: #666; letter-spacing: 2pt; }
.part-divider .part-title { font-size: 22pt; font-weight: 800; margin-top: 8pt; }
.chapter-body p { text-indent: 0; }
.appendix p { font-size: 10.5pt; }
.appendix .formula { font-family: 'Cambria Math', 'Times New Roman', serif; margin: 8pt 0; padding: 8pt 16pt; background: #f5f5f5; border-radius: 4pt; }
.header { text-align: right; font-size: 9pt; color: #999; margin-bottom: 16pt; font-style: italic; }
.footer-url { text-align: center; font-size: 9pt; color: #888; margin-top: 24pt; }
/* RTL */
html[dir="rtl"] p { text-align: right; }
html[dir="rtl"] .toc .chapter { margin-left: 0; margin-right: 24pt; }
html[dir="rtl"] .header { text-align: left; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
